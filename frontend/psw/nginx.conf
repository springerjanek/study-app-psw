
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=stats_cache:10m max_size=100m inactive=60s use_temp_path=off;

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # frontend (SPA)
    location / {
        try_files $uri /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass https://backend:7777/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # stats z cache
    location /api/users {
        proxy_pass https://backend:7777/users;

        proxy_cache stats_cache;
        proxy_cache_valid 200 30s;
        proxy_cache_use_stale error timeout updating;

        add_header X-Cache-Status $upstream_cache_status;
    }
}